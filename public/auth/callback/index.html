<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تأكيد البريد الإلكتروني</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center;
      justify-content: center; background: #0f172a; color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-align: center;
    }
    .card {
      max-width: 400px; padding: 2.5rem; background: #1e293b;
      border-radius: 1.5rem; border: 1px solid #334155;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(34,197,94,0.1); display: flex;
      align-items: center; justify-content: center; margin: 0 auto 1.25rem;
    }
    .icon svg { width: 32px; height: 32px; color: #22c55e; }
    h2 { font-size: 1.25rem; font-weight: 900; margin: 0 0 0.5rem; color: #f1f5f9; }
    p { font-size: 0.875rem; color: #94a3b8; margin: 0 0 1.5rem; line-height: 1.6; }
    .btn {
      display: inline-block; padding: 0.75rem 2rem; background: #3b82f6;
      color: #fff; border-radius: 1rem; font-weight: 700; font-size: 0.875rem;
      text-decoration: none; transition: background 0.2s;
    }
    .btn:hover { background: #2563eb; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #3b82f6; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading { display: block; }
    #success { display: none; }
    #error { display: none; }
    .error-icon { background: rgba(239,68,68,0.1) !important; }
    .error-icon svg { color: #ef4444 !important; }
  </style>
</head>
<body>
  <!-- Loading state -->
  <div id="loading" class="card">
    <div class="spinner"></div>
    <p>جارٍ التحقق...</p>
  </div>

  <!-- Success state -->
  <div id="success" class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </div>
    <h2>تم تأكيد البريد الإلكتروني بنجاح</h2>
    <p>يمكنك الآن تسجيل الدخول باستخدام بريدك الإلكتروني وكلمة المرور.</p>
    <a class="btn" id="loginBtn">تسجيل الدخول</a>
  </div>

  <!-- Error state -->
  <div id="error" class="card">
    <div class="icon error-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
      </svg>
    </div>
    <h2>حدث خطأ</h2>
    <p id="errorMsg">فشل التحقق من البريد الإلكتروني. الرابط قد يكون منتهي الصلاحية.</p>
    <a class="btn" id="retryBtn">العودة لتسجيل الدخول</a>
  </div>

  <script>
    (function() {
      var origin = window.location.origin;
      var APP_SCHEME = 'myapp';
      var APP_PACKAGE = 'app.lovable.bac2f6ed2db54e828d262c37cac1581f';

      document.getElementById('loginBtn').href = origin + '/';
      document.getElementById('retryBtn').href = origin + '/';

      // Parse the hash fragment for tokens/type
      var hash = window.location.hash.substring(1);
      var params = new URLSearchParams(hash);
      var type = params.get('type');
      var accessToken = params.get('access_token');
      var refreshToken = params.get('refresh_token') || '';
      var error = params.get('error');
      var errorDescription = params.get('error_description');

      function showSuccess() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('success').style.display = 'block';
      }

      function showError(msg) {
        document.getElementById('loading').style.display = 'none';
        if (msg) document.getElementById('errorMsg').textContent = msg;
        document.getElementById('error').style.display = 'block';
      }

      /**
       * Detect if the page was opened from a native app (Capacitor)
       * by checking for common Android/iOS browser indicators
       */
      function isNativeContext() {
        var ua = navigator.userAgent || '';
        // Chrome Custom Tab on Android includes "Android" but not "wv" (WebView)
        // We also check for the referrer or opener being absent (system browser opened externally)
        return /Android/i.test(ua) || /iPhone|iPad|iPod/i.test(ua);
      }

      /**
       * Try to open the native app via deep link.
       * On Android Chrome: uses Intent URL which is the most reliable method.
       * Fallback: uses custom scheme URL.
       */
      function openNativeApp(fragment) {
        var isAndroidChrome = /Android/i.test(navigator.userAgent) && /Chrome/i.test(navigator.userAgent);
        
        if (isAndroidChrome) {
          // Android Intent URL — Chrome handles this natively and opens the app directly
          var intentUrl = 'intent://oauth-callback' + fragment + 
            '#Intent;scheme=' + APP_SCHEME + 
            ';package=' + APP_PACKAGE + 
            ';end';
          window.location.href = intentUrl;
        } else {
          // iOS / other browsers: use custom scheme
          window.location.href = APP_SCHEME + '://oauth-callback' + fragment;
        }
      }

      // If there's an error in the URL
      if (error) {
        showError(errorDescription || 'حدث خطأ أثناء التحقق');
        return;
      }

      // If this is a signup/email confirmation
      if (type === 'signup' || type === 'email_change' || type === 'magiclink') {
        if (accessToken) {
          try {
            localStorage.removeItem('sb-' + 'nrqueogifxxdwladewey' + '-auth-token');
          } catch(e) {}
        }
        // On native context, redirect to app via deep link
        if (isNativeContext() && accessToken) {
          var confirmFragment = '#access_token=' + accessToken + '&refresh_token=' + refreshToken + '&type=' + type;
          openNativeApp(confirmFragment.replace('oauth-callback', 'email-confirmed'));
          // Use direct deep link
          window.location.href = APP_SCHEME + '://auth/email-confirmed' + confirmFragment;
          setTimeout(showSuccess, 2000);
          return;
        }
        setTimeout(showSuccess, 800);
        return;
      }

      // OAuth callback (Google, etc.)
      // NOTE: This HTML page is ONLY reached from web/browser flows.
      // The native Capacitor app uses myapp://auth/oauth-callback directly via deep link
      // and never lands on this page. Therefore, we always redirect to the web app —
      // attempting an Android intent here would fail (no app installed in browser context)
      // and waste 2 seconds before falling back, breaking the OAuth flow.
      if (accessToken && !type) {
        var tokenFragment = '#access_token=' + accessToken + '&refresh_token=' + refreshToken + '&type=oauth';
        // Use replace() so back-button doesn't return to /auth/callback
        window.location.replace(origin + '/' + tokenFragment);
        return;
      }

      // If this is a password recovery, redirect to reset-password page
      if (type === 'recovery') {
        if (isNativeContext()) {
          // Redirect to native app via deep link
          var recoveryFragment = '#access_token=' + accessToken + '&refresh_token=' + refreshToken + '&type=recovery';
          window.location.href = APP_SCHEME + '://auth/reset-password' + recoveryFragment;
          setTimeout(function() {
            window.location.replace(origin + '/reset-password#' + hash);
          }, 2000);
          return;
        }
        window.location.replace(origin + '/reset-password#' + hash);
        return;
      }

      // For any other type or if tokens exist (confirmation happened)
      if (accessToken) {
        try {
          localStorage.removeItem('sb-nrqueogifxxdwladewey-auth-token');
        } catch(e) {}
        setTimeout(showSuccess, 800);
        return;
      }

      // Fallback — no recognizable params
      setTimeout(showSuccess, 1000);
    })();
  </script>
</body>
</html>
